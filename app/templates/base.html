<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}LLM Benchmark Platform{% endblock %}</title>
<style>
:root{--blue:#1a73e8;--green:#137333;--red:#b3261e;--grey:#5f6368;}
*{box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;color:#202124;background:#f1f3f4}
header{background:#202124;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:24px}
header a{color:#fff;text-decoration:none;font-size:14px;opacity:.85}
header a:hover{opacity:1}
header .brand{font-weight:600;font-size:16px}
main{max-width:1300px;margin:24px auto;padding:0 24px}
h1{font-size:22px}
table{border-collapse:collapse;width:100%;background:#fff;font-size:13px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
th,td{border:1px solid #e0e0e0;padding:6px 9px;text-align:left;white-space:nowrap}
th{background:#f1f3f4;position:sticky;top:0}
.scroll{overflow-x:auto;border:1px solid #e0e0e0}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;color:#fff}
.tag.ok{background:var(--green)} .tag.no{background:var(--red)} .tag.run{background:var(--blue)} .tag.grey{background:var(--grey)}
form label{display:block;margin:12px 0 4px;font-size:13px;font-weight:600}
form input,form select,form textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px}
button{margin-top:16px;background:var(--blue);color:#fff;border:0;padding:10px 18px;border-radius:4px;font-size:14px;cursor:pointer}
.card{background:#fff;padding:20px;border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.1);margin-bottom:18px}
.hint{color:var(--grey);font-size:12px;margin-top:4px}
a.btn{display:inline-block;margin:2px 6px 2px 0;padding:4px 10px;background:#e8f0fe;color:var(--blue);border-radius:4px;text-decoration:none;font-size:12px}
pre{background:#202124;color:#e8eaed;padding:12px;border-radius:4px;overflow:auto;max-height:360px;font-size:12px}
</style>
</head>
<body>
<header>
  <span class="brand">⚡ LLM Bench</span>
  <a href="/submit">提交任务</a>
  <a href="/jobs">任务列表</a>
  <a href="/leaderboard">排行榜</a>
  <a href="/leaderboard/chat_completions">Chat 榜</a>
  <a href="/leaderboard/completions">Completions 榜</a>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
